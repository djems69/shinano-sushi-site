<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Questionnaire de satisfaction — Shinano Sushi</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black-deep:#0a0908;
    --black-card:#1b1714;
    --gold:#c9a44c;
    --gold-bright:#e8cd87;
    --gold-dim:#8a723a;
    --sakura:#f2c6d6;
    --ivory:#efe6d8;
    --line:rgba(201,164,76,0.22);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background:var(--black-deep);
    color:var(--ivory);
    font-family:'Zen Kaku Gothic New', sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background:radial-gradient(ellipse at 20% 0%, rgba(201,164,76,0.08), transparent 55%),
               radial-gradient(ellipse at 85% 15%, rgba(242,198,214,0.06), transparent 50%);
    pointer-events:none;
  }
  .card{
    position:relative; z-index:1;
    max-width:420px; width:100%;
    background:var(--black-card);
    border:1px solid var(--line);
    border-radius:8px;
    padding:38px 28px;
    text-align:center;
  }
  .blossom{font-size:30px; color:var(--sakura); margin-bottom:16px;}
  h1{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:22px;
    color:var(--gold-bright);
    margin-bottom:14px;
    letter-spacing:0.02em;
  }
  p.msg{
    font-size:14.5px;
    color:rgba(239,230,216,0.85);
    line-height:1.7;
    margin-bottom:26px;
  }
  a.btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:15px 26px; border-radius:4px;
    font-size:13px; letter-spacing:0.12em; text-transform:uppercase;
    background:linear-gradient(135deg, var(--gold), var(--gold-dim));
    color:var(--black-deep); font-weight:700;
    text-decoration:none;
    box-shadow:0 12px 30px rgba(201,164,76,0.25);
    transition:transform .25s ease;
  }
  a.btn:active{transform:scale(0.97);}
  .foot{
    margin-top:22px;
    font-size:11px;
    color:rgba(239,230,216,0.4);
    letter-spacing:0.05em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="blossom">❀</div>
    <h1>Shinano Sushi</h1>
    <p class="msg">Le lien vers le questionnaire de satisfaction est disponible en suivant ce lien.</p>
    <a class="btn" href="https://forms.gle/dxvVKfr7DhkQeEXP8" target="_blank" rel="noopener">Accéder au questionnaire</a>
    <div class="foot">Merci pour votre visite chez Shinano Sushi</div>
  </div>
</body>
</html>
